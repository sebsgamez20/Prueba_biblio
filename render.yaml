services:
  - type: web
    name: biblioteca-digital
    env: php
    plan: starter
    buildCommand: |
      composer install --no-dev --optimize-autoloader
      npm install
      npm run build
    startCommand: |
      php artisan migrate --force
      php artisan storage:link
      php artisan config:cache
      php artisan route:cache
      php artisan view:cache
      vendor/bin/heroku-php-apache2 public/
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_URL
        value: https://biblioteca-digital.onrender.com
      - key: LOG_CHANNEL
        value: stack
      - key: CACHE_DRIVER
        value: file
      - key: SESSION_DRIVER
        value: file
      - key: SESSION_LIFETIME
        value: 120
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: biblioteca-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: biblioteca-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: biblioteca-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: biblioteca-db
          property: username
      - key: DB_PASSWORD
        fromDatabase:
          name: biblioteca-db
          property: password

databases:
  - name: biblioteca-db
    databaseName: biblioteca
    user: biblioteca_user
    plan: starter 